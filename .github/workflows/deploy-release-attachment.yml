name: Deploy Release Attachment

on:
  workflow_run:
    types: [completed]
    branches: [main]
    workflows: 
      - build-dotnet

  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID of a build workflow"
        required: true
        type: string

jobs:
  deploy-release-attachment:
    if: ${{ github.repository == 'Pandora1337/ucc' && (github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download artifacts from build workflow
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          path: ./build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download artifacts from workflow dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          path: ./build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.inputs.run_id }}
      
      - name: Parse tag from Artifact
        id: get-tag
        run: |
          ARTIFACT_NAME=$(ls /home/runner/work/ucc/ucc/build | head -n1)
          echo "Artifact name: $ARTIFACT_NAME"
          echo "tag=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Creating tarball
        env:
          TAG: ${{ steps.get-tag.outputs.tag }}
        run: tar -czvf "ucc-${TAG}.tar.gz" "/home/runner/work/ucc/ucc/build/${TAG}"

      - name: Upload to release
        env:
          TAG: ${{ steps.get-tag.outputs.tag }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b #v3.01
        with:
          draft: true
          tag_name: ${{ env.TAG }}
          files: ucc-${{ env.TAG }}.tar.gz