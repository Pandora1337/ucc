name: Deploy Release Attachment

on:
  workflow_run:
    types: [completed]
    branches: [main]
    workflows: 
      - build-dotnet

  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID of a build workflow"
        required: true
        type: string

jobs:
  deploy-release-attachment:
    if: ${{ github.repository == 'Pandora1337/ucc' && (github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Get Run ID
        id: get-run-id
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_id=${{ github.event.inputs.run_id }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          skip-decompress: true
          path: ./build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get-run-id.outputs.run_id }}
      
      - name: Parse tag from Artifact
        id: get-tag
        run: |
          ARTIFACT_NAME=$(basename "$(ls ./build | head -n1)" | sed 's/\.[^.]*$//')
          echo "Artifact name: $ARTIFACT_NAME"
          echo "tag=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Rename file
        env:
          TAG: ${{ steps.get-tag.outputs.tag }}
        run: mv ./build/${TAG}.zip ucc-${TAG}.zip

      - name: Upload to release
        env:
          TAG: ${{ steps.get-tag.outputs.tag }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b #v3.01
        with:
          draft: true
          tag_name: ${{ env.TAG }}
          files: ucc-${{ env.TAG }}.zip