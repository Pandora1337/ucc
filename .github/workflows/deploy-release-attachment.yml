name: Deploy Release Attachment

on:
  workflow_run:
    types: [completed]
    branches: [main]
    workflows: 
      - build-dotnet

  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID of a build workflow"
        required: true
        type: string

jobs:
  deploy-release-attachment:
    if: ${{ github.repository == 'Pandora1337/ucc' && (github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Download artifacts from build workflow
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/download-artifact@v4
        with:
          path: ./build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download artifacts from workflow dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/download-artifact@v4
        with:
          path: ./build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.inputs.run_id }}
      
      - name: Parse tag from Artifact
        id: get-tag
        run: |
          ARTIFACT_NAME=$(ls ./build | head -n1)
          echo "Artifact name: $ARTIFACT_NAME"
          echo "tag=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Creating tarball
        run: tar -czvf ucc-$TAG.tar.gz ./build/$TAG

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ucc-$TAG.tar.gz