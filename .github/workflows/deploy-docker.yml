name: Deploy Docker Image

on:
  workflow_run:
    types: [completed]
    branches: [main]
    workflows: 
      - Build Dotnet

  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID of a build workflow"
        required: true
        type: string

jobs:
  deploy-docker:
    name: Docker Image
    if: ${{ github.repository == 'Pandora1337/ucc' && (github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Get Run ID
        id: get-run-id
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_id=${{ github.event.inputs.run_id }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout nginx.conf and Dockerfile
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            Dockerfile
            nginx.conf

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          path: ./build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get-run-id.outputs.run_id }}
      
      - name: Parse tag from Artifact
        id: get-tag
        run: |
          ARTIFACT_NAME=$(basename "$(ls ./build | head -n1)")
          echo "Artifact name: $ARTIFACT_NAME"
          echo "tag=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Move files
        env:
          TAG: ${{ steps.get-tag.outputs.tag }}
        run: |
          mkdir -p ./bin/Release/net8.0/publish
          mv ./build/${TAG}/* ./bin/Release/net8.0/publish

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 #v4.1.0

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf #v7.2.0
        env:
          TAG: ${{ steps.get-tag.outputs.tag }}
        with:
          push: true
          context: .
          tags: pandora1337/ucc:latest,pandora1337/ucc:${{ env.TAG }}
