name: Deploy GitHub Pages

on:
  workflow_run:
    types: [completed]
    branches: [main]
    workflows: 
      - Build Dotnet

  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID of a build workflow"
        required: true
        type: string


jobs:
  deploy-pages:
    name: GitHub Pages
    if: ${{ github.repository == 'Pandora1337/ucc' && (github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Get Run ID
        id: get-run-id
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_id=${{ github.event.inputs.run_id }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          path: ./build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get-run-id.outputs.run_id }}
      
      - name: Parse tag from Artifact
        id: get-tag
        run: |
          ARTIFACT_NAME=$(basename "$(ls ./build | head -n1)")
          echo "Artifact name: $ARTIFACT_NAME"
          echo "tag=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Rewrite base href
        uses: SteveSandersonMS/ghaction-rewrite-base-href@4583ede549773dabe1410c42e703d54cf52859ff #v1.1.0
        env:
          TAG: ${{ steps.get-tag.outputs.tag }}
        with:
          html_path: './build/${{ env.TAG }}/wwwroot/index.html'
          base_href: '/${{ github.event.repository.name }}/'

      - name: Copy index.html to 404.html
        env:
          TAG: ${{ steps.get-tag.outputs.tag }}
        run: cp ./build/${{ env.TAG }}/wwwroot/index.html ./build/${{ env.TAG }}/wwwroot/404.html 

      - name: Create .nojekyll file
        env:
          TAG: ${{ steps.get-tag.outputs.tag }}
        run: touch ./build/${{ env.TAG }}/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d #v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 #v5
        env:
          TAG: ${{ steps.get-tag.outputs.tag }}
        with:
          path: './build/${{ env.TAG }}/wwwroot'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 #v5